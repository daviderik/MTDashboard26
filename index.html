<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magna-Tiles Production Master Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tab-active { 
            background-color: #0f172a; 
            border-color: #1e1b4b; 
            color: white; 
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.5);
        }

        .dark .tab-active {
            background-color: #312e81;
            border-color: #6366f1;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .completed-card {
            opacity: 0.35;
            text-decoration: line-through !important;
            filter: grayscale(1);
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0 !important; }
            .print-card { border: 1px solid #000 !important; page-break-inside: avoid; background: white !important; color: black !important; }
            header { border-bottom: 3px solid #0f172a !important; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#080c14] text-slate-950 dark:text-slate-200 transition-colors duration-500 p-4 md:p-10 min-h-screen">
    <div class="max-w-6xl mx-auto">
        
        <!-- Dashboard Header -->
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 border-b-4 border-slate-950 dark:border-slate-800 pb-8 gap-6">
            <div class="flex-1">
                <div class="flex items-center gap-3 mb-4">
                    <span class="bg-slate-950 dark:bg-indigo-600 text-white dark:text-slate-900 text-[10px] font-black px-3 py-1.5 rounded-md uppercase tracking-[0.25em] shadow-lg">Executive Master Schedule</span>
                    <button id="themeToggle" class="no-print p-2.5 rounded-xl border-2 border-slate-900 dark:border-slate-800 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all flex items-center justify-center bg-white dark:bg-slate-900 shadow-sm" title="Toggle Day/Night Mode">
                        <svg id="sunIcon" class="hidden dark:block text-amber-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                        <svg id="moonIcon" class="block dark:hidden text-slate-950" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
                <h1 class="text-4xl md:text-7xl font-black text-slate-950 dark:text-white tracking-tighter uppercase leading-none mb-3">
                    <span id="headerClientName">Magna-Tiles</span> <span id="headerYear" class="text-slate-400 dark:text-slate-500 font-thin italic">2026 Production</span>
                </h1>
                <p class="text-slate-900 dark:text-slate-400 font-extrabold uppercase text-sm tracking-widest">Master View • Comprehensive Portfolio Cycle</p>
            </div>
            
            <div class="flex flex-col sm:flex-row items-stretch gap-4 no-print">
                <div class="bg-white dark:bg-slate-900 p-5 rounded-2xl border-2 border-slate-950 dark:border-slate-800 shadow-xl flex gap-6 items-center">
                    <div class="text-center">
                        <span class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Products</span>
                        <span id="totalProductCount" class="text-slate-950 dark:text-white font-black text-3xl">18</span>
                    </div>
                    <div class="w-px h-12 bg-slate-950 dark:bg-slate-800"></div>
                    <div class="text-center min-w-[120px]">
                        <span class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Network</span>
                        <span id="syncStatus" class="text-slate-400 font-black text-xl uppercase tracking-tighter leading-none">Scanning</span>
                    </div>
                </div>
                <button onclick="window.print()" class="bg-slate-950 dark:bg-white text-white dark:text-slate-900 font-black text-xs uppercase tracking-widest px-8 py-5 rounded-2xl hover:bg-slate-800 dark:hover:bg-slate-200 transition-all shadow-xl flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    Print Schedule
                </button>
            </div>
        </header>

        <!-- Progress Section -->
        <section class="mb-10 no-print">
            <div class="flex justify-between items-end mb-2 px-1">
                <h3 class="text-[11px] font-black uppercase tracking-[0.35em] text-slate-600 dark:text-slate-500">Overall Production Progress</h3>
                <span id="progressText" class="text-xl font-black text-slate-950 dark:text-indigo-400">0%</span>
            </div>
            <div class="w-full h-5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden shadow-inner border-2 border-slate-300 dark:border-slate-700">
                <div id="progressBar" class="h-full bg-slate-950 dark:bg-indigo-500 transition-all duration-700 ease-out shadow-[0_0_15px_rgba(0,0,0,0.2)]" style="width: 0%"></div>
            </div>
        </section>

        <!-- Navigation -->
        <nav class="flex overflow-x-auto gap-4 mb-10 no-scrollbar pb-6 no-print" id="dateNav">
            <button onclick="setDay('master')" id="masterBtn" class="flex-shrink-0 px-8 py-5 rounded-2xl border-2 transition-all duration-300 flex flex-col items-center min-w-[140px] tab-active">
                <span class="text-[10px] uppercase font-black mb-1 opacity-60">Consolidated</span>
                <span class="text-xl font-black">MASTER</span>
                <span class="text-[10px] uppercase font-bold tracking-widest">SCHEDULE</span>
            </button>
            <div class="w-px h-12 bg-slate-400 dark:bg-slate-800 self-center mx-2"></div>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2 space-y-8">
                <div class="flex items-center justify-between px-2">
                    <h2 id="viewTitle" class="text-3xl font-black text-slate-950 dark:text-white uppercase tracking-tight flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="text-slate-950 dark:text-indigo-500" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                        Full Production Log
                    </h2>
                </div>
                <div id="productList" class="space-y-5"></div>
            </div>

            <aside class="space-y-6">
                <div class="bg-white dark:bg-indigo-950/10 border-2 border-slate-950 dark:border-indigo-500/20 rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden sticky top-10">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 rounded-full -mr-16 -mt-16"></div>
                    <h4 class="text-slate-950 dark:text-indigo-400 text-[11px] font-black uppercase tracking-[0.35em] mb-10 border-b-2 border-slate-200 dark:border-indigo-500/10 pb-5">Logistical Data</h4>
                    <div class="space-y-12" id="logisticsInfo"></div>
                    <div class="mt-12 pt-8 border-t-2 border-slate-200 dark:border-indigo-500/10">
                        <p class="text-[11px] text-slate-600 dark:text-slate-500 leading-relaxed italic font-black uppercase tracking-widest">
                            Ref: P1-MGT-2026
                        </p>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="wrapToast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-8 py-4 rounded-full font-black uppercase tracking-widest shadow-2xl opacity-0 translate-y-20 transition-all duration-500 z-50 pointer-events-none">
        🎉 Production Wrapped
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FIREBASE CONFIG (Verified from your screenshots) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBJdFbuzW_ywm2Q5QAEifYBNsOXqOetJM",
            authDomain: "mtdashboard-6500c.firebaseapp.com",
            projectId: "mtdashboard-6500c",
            storageBucket: "mtdashboard-6500c.firebasestorage.app",
            messagingSenderId: "1004082539822",
            appId: "1:1004082539822:web:9888a9e7868024eb2f9ebf",
            measurementId: "G-ZCVWVRZ652"
        };

        const CONFIG = {
            clientName: "Magna-Tiles",
            productionYear: "2026",
            unitCall: "07:00 AM",
            monthName: "MARCH",
            appIdentifier: "mtdashboard-mgt-v1" 
        };

        const scheduleData = [
            {
                date: "March 12", day: "1", location: "Dining Room",
                products: [
                    { id: "p1", name: "Camp Out 16pc Set", type: "Video + Photo", focus: "Cozy campfire vibes and outdoor adventure." },
                    { id: "p2", name: "Raging Rapids 27pc Set", type: "Video + Photo", focus: "Elevated builds with motion-focused storytelling." },
                    { id: "p3", name: "Spooky Travel 24pc Set", type: "Photo Only", focus: "Thematic travel-ready highlights." }
                ]
            },
            {
                date: "March 13", day: "2", location: "Dining Room / Multi-Level",
                products: [
                    { id: "p4", name: "Rail Racers Max 80pc Set", type: "Video + Photo", focus: "Maxed-out track building with multi-level courses." },
                    { id: "p5", name: "Tree Top Adventure 42pc Set", type: "Video + Photo", focus: "Forest canopy scene with wildlife discovery." },
                    { id: "p6", name: "Tree Top Themes (Group)", type: "Video + Photo", focus: "Massive forest world integration / Crossover play." }
                ]
            },
            {
                date: "March 16", day: "3", location: "Living Room (End Table)",
                products: [
                    { id: "p7", name: "Shark Dive 13pc Set", type: "Video + Photo", focus: "Compact deep-sea adventure; storytelling in small footprints." },
                    { id: "p8", name: "Dolphin Bay 13pc Set", type: "Video + Photo", focus: "Beach-themed coastal storytelling." }
                ]
            },
            {
                date: "March 17", day: "4", location: "Living Room (Coffee Table)",
                products: [
                    { id: "p9", name: "Coral Reef 25pc Set", type: "Video + Photo", focus: "Character-driven storytelling in a lively habitat." },
                    { id: "p10", name: "Lighthouse Rescue 25pc Set", type: "Video + Photo", focus: "Vertical rescue-focused builds and coastal backdrops." },
                    { id: "p11", name: "Gingerbread House Travel Set", type: "Photo Only", focus: "Seasonal thematic collection." }
                ]
            },
            {
                date: "March 18", day: "5", location: "Living Room (Floor/Tiered)",
                products: [
                    { id: "p12", name: "Undersea Adventure 58pc Set", type: "Video + Photo", focus: "Large scale multi-level building with sensory tiles." },
                    { id: "p13", name: "Ocean Themes (Group)", type: "Video + Photo", focus: "Full collection scale and 100% compatibility showcase." },
                    { id: "p14", name: "microMAGS Cubes 9pc Set", type: "Photo Only", focus: "New product format introduction." }
                ]
            },
            {
                date: "March 19", day: "6", location: "Playroom / Classroom",
                products: [
                    { id: "p15", name: "Castle", type: "Video + Photo", focus: "Fantasy storytelling with working drawbridge and royalty." },
                    { id: "p16", name: "Downhill Duo", type: "Video + Photo", focus: "High-speed racing and downhill adventure." },
                    { id: "p17", name: "microMAGS Letters/Numbers", type: "Photo Only", focus: "Educational segment for classroom environments." },
                    { id: "p18", name: "microMAGS Shape Set", type: "Photo Only", focus: "Standard classroom shape highlights." }
                ]
            }
        ];

        let app, auth, db;
        let currentView = 'master'; 
        let completedProducts = [];

        // STARTUP
        window.addEventListener('load', () => {
            document.getElementById('headerClientName').innerText = CONFIG.clientName;
            document.getElementById('headerYear').innerText = `${CONFIG.productionYear} Production`;
            updateUI(); 
            initFirebase();
        });

        async function initFirebase() {
            const syncEl = document.getElementById('syncStatus');
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        syncEl.innerText = "Live";
                        syncEl.className = "text-emerald-600 font-black text-xl uppercase tracking-tighter leading-none";
                        startSync();
                    }
                });

                await signInAnonymously(auth);
            } catch (e) {
                console.error("Firebase auth failed:", e);
                syncEl.className = "text-slate-400 font-black text-xl uppercase tracking-tighter leading-none cursor-help";
                syncEl.innerText = "Local";
                syncEl.title = "Cloud sync in standby. Using local session data.";
            }
        }

        const startSync = () => {
            const syncEl = document.getElementById('syncStatus');
            const docRef = doc(db, 'artifacts', CONFIG.appIdentifier, 'public', 'data', 'checklists', 'production_state');
            
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    completedProducts = snapshot.data().completedIds || [];
                    updateUI();
                } else {
                    setDoc(docRef, { completedIds: [] });
                }
            }, (error) => {
                console.error("Sync error:", error);
                syncEl.innerText = "Sync Error";
                syncEl.className = "text-red-600 font-black text-xl uppercase tracking-tighter underline cursor-help leading-none";
            });
        };

        window.toggleProduct = async (id) => {
            if (completedProducts.includes(id)) {
                completedProducts = completedProducts.filter(item => item !== id);
            } else {
                completedProducts.push(id);
            }
            updateUI();

            if (auth && auth.currentUser) {
                const docRef = doc(db, 'artifacts', CONFIG.appIdentifier, 'public', 'data', 'checklists', 'production_state');
                try {
                    await setDoc(docRef, { completedIds: completedProducts });
                } catch (e) {
                    console.error("Cloud update failed:", e);
                }
            }
        };

        window.setDay = (view) => {
            currentView = view;
            updateUI();
        };

        function updateUI() {
            try {
                const totalProducts = scheduleData.reduce((acc, day) => acc + day.products.length, 0);
                document.getElementById('totalProductCount').innerText = totalProducts;
                const percent = Math.round(((completedProducts || []).length / totalProducts) * 100);
                document.getElementById('progressBar').style.width = `${percent}%`;
                document.getElementById('progressText').innerText = `${percent}%`;

                if (percent === 100) document.getElementById('wrapToast').classList.remove('opacity-0', 'translate-y-20');
                else document.getElementById('wrapToast').classList.add('opacity-0', 'translate-y-20');

                const nav = document.getElementById('dateNav');
                document.getElementById('masterBtn').className = `flex-shrink-0 px-8 py-5 rounded-2xl border-2 transition-all duration-300 flex flex-col items-center min-w-[140px] ${currentView === 'master' ? 'tab-active' : 'bg-white dark:bg-slate-900 border-slate-950 dark:border-slate-800 text-slate-950 dark:text-slate-500 shadow-sm'}`;
                
                if (nav && nav.children.length === 2) {
                    scheduleData.forEach((day, i) => {
                        const btn = document.createElement('button');
                        btn.id = `dayBtn-${i}`;
                        btn.onclick = () => setDay(i);
                        nav.appendChild(btn);
                    });
                }
                
                scheduleData.forEach((day, i) => {
                    const btn = document.getElementById(`dayBtn-${i}`);
                    if (btn) {
                        btn.className = `flex-shrink-0 px-8 py-5 rounded-2xl border-2 transition-all duration-300 flex flex-col items-center min-w-[130px] ${currentView === i ? 'tab-active' : 'bg-white dark:bg-slate-900 border-slate-300 dark:border-slate-800 text-slate-950 dark:text-slate-500 hover:border-slate-950 dark:hover:border-slate-600 shadow-sm'}`;
                        btn.innerHTML = `<span class="text-[10px] uppercase font-black mb-1 opacity-60">Day ${day.day}</span><span class="text-xl font-black">${day.date.split(' ')[1]}</span><span class="text-[10px] uppercase font-bold tracking-widest">${CONFIG.monthName}</span>`;
                    }
                });

                const list = document.getElementById('productList');
                if (!list) return;
                list.innerHTML = '';
                
                let productsToShow = [];
                let videoCount = 0; let photoCount = 0;

                if (currentView === 'master') {
                    document.getElementById('viewTitle').innerText = "Full Production Log";
                    scheduleData.forEach(day => day.products.forEach(p => productsToShow.push({...p, date: day.date})));
                } else {
                    const dayData = scheduleData[currentView];
                    document.getElementById('viewTitle').innerText = `${dayData.date} Objectives`;
                    productsToShow = dayData.products.map(p => ({...p, date: dayData.date}));
                }

                productsToShow.forEach(p => {
                    if (p.type.includes("Video")) videoCount++; else photoCount++;
                    const isCompleted = (completedProducts || []).includes(p.id);
                    const isPhotoOnly = p.type.includes("Photo Only");
                    const div = document.createElement('div');
                    div.className = `print-card group relative bg-white dark:bg-slate-900/40 border-2 ${isPhotoOnly && !isCompleted ? 'border-red-600/50' : 'border-slate-200 dark:border-slate-800'} rounded-[2rem] p-8 transition-all duration-300 shadow-sm ${isCompleted ? 'completed-card' : 'hover:shadow-2xl hover:border-slate-950 dark:hover:border-indigo-500/40'}`;
                    div.innerHTML = `
                        <div class="flex items-start gap-8">
                            <div class="flex-shrink-0 pt-1 no-print">
                                <input type="checkbox" ${isCompleted ? 'checked' : ''} class="checkbox-input w-8 h-8 rounded-lg border-2 border-slate-950 dark:border-slate-700 bg-transparent text-slate-950 dark:text-indigo-600 focus:ring-slate-950 cursor-pointer transition-transform hover:scale-110">
                            </div>
                            <div class="flex-1">
                                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
                                    <h3 class="text-2xl font-black text-slate-950 dark:text-white group-hover:text-indigo-900 dark:group-hover:text-indigo-400 transition-colors uppercase tracking-tight leading-none">${p.name}</h3>
                                    <div class="flex items-center gap-2">
                                        ${currentView === 'master' ? `<span class="text-[9px] font-black bg-slate-200 dark:bg-slate-800 px-2 py-1 rounded-md text-slate-900 dark:text-slate-500">${p.date}</span>` : ''}
                                        <span class="flex items-center gap-1.5 text-[10px] font-black uppercase tracking-[0.2em] px-3.5 py-2 rounded-xl ${isPhotoOnly ? 'bg-red-500/10 text-red-700 border-2 border-red-600/30' : 'bg-slate-950 dark:bg-indigo-500 text-white dark:text-slate-900 shadow-lg shadow-slate-900/10'}">${isPhotoOnly ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>' : ''}${p.type}</span>
                                    </div>
                                </div>
                                <p class="text-slate-950 dark:text-slate-400 text-base leading-relaxed italic font-bold border-l-4 ${isPhotoOnly ? 'border-red-600/30' : 'border-slate-950 dark:border-slate-800'} pl-5 py-2">"${p.focus}"</p>
                            </div>
                        </div>`;
                    
                    const check = div.querySelector('.checkbox-input');
                    if (check) check.onclick = () => window.toggleProduct(p.id);
                    list.appendChild(div);
                });

                const loc = currentView === 'master' ? "Variable Location" : scheduleData[currentView].location;
                const logPanel = document.getElementById('logisticsInfo');
                if (logPanel) {
                    logPanel.innerHTML = `
                        <div class="flex gap-7"><div class="flex-shrink-0 w-16 h-16 rounded-2xl bg-slate-950 dark:bg-indigo-500/20 flex items-center justify-center text-white dark:text-indigo-400 shadow-xl border-2 border-slate-950"><svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></div><div><span class="block text-[11px] text-slate-600 dark:text-slate-500 uppercase font-black tracking-widest mb-1">Active Set</span><span class="text-slate-950 dark:text-white font-extrabold text-xl leading-tight">${loc}</span></div></div>
                        <div class="flex gap-7"><div class="flex-shrink-0 w-16 h-16 rounded-2xl bg-white dark:bg-slate-800 flex items-center justify-center text-slate-950 dark:text-slate-300 border-2 border-slate-950 dark:border-slate-700 shadow-md"><svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><span class="block text-[11px] text-slate-600 dark:text-slate-500 uppercase font-black tracking-widest mb-1">Unit Call</span><span class="text-slate-950 dark:text-white font-extrabold text-xl uppercase tracking-tighter">${CONFIG.unitCall}</span></div></div>
                        <div class="flex gap-7"><div class="flex-shrink-0 w-16 h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center text-slate-950 dark:text-slate-400"><span class="text-lg font-black">${videoCount}</span><span class="text-[8px] font-black uppercase">Video</span></div><div><span class="block text-[11px] text-slate-600 dark:text-slate-500 uppercase font-black tracking-widest mb-1">Day Assets</span><span class="text-slate-950 dark:text-white font-extrabold text-lg leading-tight">${photoCount} Photo Units</span></div></div>
                    `;
                }
            } catch (err) {
                console.error("UI Update crashed:", err);
            }
        }

        window.setDay = setDay;
        window.toggleProduct = toggleProduct;

        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('mgt_theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
